# ============================================================================
# SpartaFlow — production Nginx configuration
# ----------------------------------------------------------------------------
# Reverse proxy in front of the TanStack Start SSR server (Nitro/Node, :3000).
#
#   client → Cloudflare → [this Nginx] → app (SSR :3000) → Supabase (managed)
#
# Features: HTTPS-only, HTTP→HTTPS redirect, gzip compression, immutable asset
# caching, deep-link (SPA/SSR) routing, security headers, rate limiting,
# hardened proxying, and a /healthz endpoint.
#
# This is a COMPLETE nginx.conf (http + server). Mount/copy it to
# /etc/nginx/nginx.conf. To use only the server blocks, lift the two `server {}`
# stanzas into /etc/nginx/conf.d/ and keep the http-level directives
# (limit_req_zone, map, gzip, real-IP) in the main config.
#
# Placeholders to edit:  app.spartaflow.com  ·  cert paths  ·  upstream target.
# See docs/NGINX.md.
# ============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Base performance ---------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;                 # do not leak the Nginx version
    client_max_body_size 10m;               # tune to Supabase Storage uploads

    # ---- Logging ------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---- Real client IP (behind Cloudflare) ---------------------------------
    # Without this, every request appears to come from a Cloudflare IP and would
    # share one rate-limit bucket. Keep ranges current: https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header   CF-Connecting-IP;       # use CF-Connecting-IP as the client IP

    # ---- WebSocket / SSE upgrade passthrough --------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---- Compression --------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proprietary  off;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml application/rss+xml
        application/vnd.ms-fontobject application/wasm
        font/ttf font/otf image/svg+xml;
    # Brotli (better ratios) — enable if the ngx_brotli module is installed:
    # brotli            on;
    # brotli_comp_level 5;
    # brotli_types      text/plain text/css application/javascript application/json image/svg+xml;

    # ---- Rate limiting ------------------------------------------------------
    # Per-client-IP request-rate zones and a concurrent-connection cap.
    limit_req_zone  $binary_remote_addr zone=req_general:10m rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=req_strict:10m  rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_status  429;
    limit_conn_status 429;

    # ---- TLS (shared) -------------------------------------------------------
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ---- Upstream: the SSR server -------------------------------------------
    # Host/systemd deployment → 127.0.0.1:3000.
    # Docker Compose         → change to `server app:3000;`.
    upstream spartaflow_app {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP :80 — health passthrough + permanent redirect to HTTPS
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name app.spartaflow.com;

        # Allow plain-HTTP health checks (load balancers / uptime probes).
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ACME HTTP-01 challenge (if using Let's Encrypt on the origin).
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else → HTTPS.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS :443 — the application
    # =========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name app.spartaflow.com;

        # --- Certificates ----------------------------------------------------
        # Cloudflare Origin CA cert (recommended, for Full (strict)) or Let's Encrypt.
        ssl_certificate     /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        # Authenticated Origin Pulls — only accept traffic from Cloudflare.
        # Download the CF cert and uncomment for Full (strict) lockdown:
        # ssl_client_certificate /etc/nginx/certs/cloudflare-origin-pull-ca.pem;
        # ssl_verify_client on;

        # --- Security headers (applied site-wide) ----------------------------
        # NOTE: add_header does NOT inherit into a location that declares its own
        # add_header, so these are repeated in the /assets block below.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        # Content-Security-Policy: start in Report-Only, tighten, then enforce.
        # Must permit the Supabase origin for XHR/WebSocket. Example baseline:
        # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

        # Concurrent-connection cap per client IP.
        limit_conn conn_limit 20;

        # --- Health endpoint (answered by Nginx; independent of upstream) ----
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # --- Immutable, content-hashed build assets --------------------------
        # Long-lived cache; assets are fingerprinted so they never change in place.
        location /assets/ {
            proxy_pass http://spartaflow_app;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Re-declare security headers (add_header does not inherit here):
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # --- Static files with common asset extensions -----------------------
        location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico|map)$ {
            proxy_pass http://spartaflow_app;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # --- Application (SSR + deep-link / SPA routing) ---------------------
        # Every non-asset path proxies to the SSR server, which resolves the
        # route (SSR + client router). A hard refresh on /app/tasks/kanban is
        # rendered by the app — no 404s. This is the SSR equivalent of an
        # index.html SPA fallback. (Static-only variant: see docs/NGINX.md.)
        location / {
            limit_req zone=req_general burst=50 nodelay;

            proxy_pass http://spartaflow_app;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # WebSocket / SSE support (harmless when unused).
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering       on;

            # Do not cache HTML/SSR responses at the proxy layer.
            proxy_no_cache      1;
            proxy_cache_bypass  1;
        }

        # Optional: apply the stricter zone to sensitive SSR endpoints, e.g.
        # login/server-function POSTs. Adjust the prefix to your route.
        # location /_serverFn/ {
        #     limit_req zone=req_strict burst=10 nodelay;
        #     proxy_pass http://spartaflow_app;
        #     include /etc/nginx/proxy_params;   # or repeat the proxy_set_header block
        # }

        # Hide dotfiles.
        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}
