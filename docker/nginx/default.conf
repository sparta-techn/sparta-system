# SpartaFlow — Nginx reverse proxy in front of the Nitro/Node SSR server.
# Proxies to the `app` service on the compose network. TLS is terminated by
# Cloudflare in production; enable the 443 block below for origin TLS.

upstream spartaflow_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Health endpoint for the container healthcheck / Cloudflare / load balancers.
    # Answered by Nginx directly so it never depends on the upstream.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Content-hashed, immutable build assets → long-lived cache.
    location /assets/ {
        proxy_pass http://spartaflow_app;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Everything else → SSR (HTML + server functions).
    location / {
        proxy_pass http://spartaflow_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 10m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}

# --- Origin TLS (optional) --------------------------------------------------
# Uncomment, publish 443 in compose, and mount ./docker/nginx/certs to run
# Cloudflare Full (strict) with a Cloudflare Origin CA cert.
