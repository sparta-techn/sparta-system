# Test — Vitest (unit + component) with an optional Playwright e2e smoke.
# Unit + component are blocking; e2e is best-effort (needs a running app and
# Supabase env) so it never blocks a deploy on flakiness.
name: Test

on:
  pull_request:
  push:
    branches-ignore: [main] # on main this runs inside the Deploy pipeline instead
  workflow_call:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-component:
    name: Unit + Component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun run test:unit

      - name: Component tests
        run: bun run test:component

  e2e:
    name: E2E (Playwright · smoke)
    runs-on: ubuntu-latest
    # Best-effort: report but never block the pipeline (deploy does not `need` it).
    continue-on-error: true
    # Skip if the required Supabase env for booting the dev server is absent.
    if: github.event_name != 'push'
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run e2e (Playwright starts the app via webServer)
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
