# Build — build the production Docker image and push it to GHCR.
# Reusable (workflow_call) so Deploy can consume the resulting image tag, and
# manually runnable (workflow_dispatch). Verifies the Node/Nitro build too.
name: Build

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      image:
        description: "Fully-qualified image ref that was pushed (with immutable SHA tag)"
        value: ${{ jobs.image.outputs.image }}

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # push to GitHub Container Registry (GHCR)

jobs:
  image:
    name: Docker image → GHCR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Export immutable image ref (SHA tag)
        id: ref
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.meta.outputs.digest }}"
          # Also expose a human-readable SHA tag for logs/rollback records.
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "Pushed digest ref: $IMAGE"
